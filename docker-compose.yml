version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: zcms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zcms
      POSTGRES_PASSWORD: zcms_secret_2026
      POSTGRES_DB: zcms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zcms"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zcms-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://zcms:zcms_secret_2026@postgres:5432/zcms"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm start"

volumes:
  postgres_data:
